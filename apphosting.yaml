runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  env:
    - variable: PORT
      value: "8080"
    - variable: NODE_ENV
      value: "production"

buildConfig:
  runtime: nodejs22
  commands:
    - name: "Install dependencies (with dev)"
      command: "npm ci"
      
    - name: "Build frontend and backend"
      command: "npm run build:all"
      
    - name: "Install backend dependencies (already installed at root)"
      command: "echo skip"
      
    - name: "Verify backend build exists"
      command: "test -f backend/dist/index.js && echo 'backend/dist/index.js present' || (echo 'ERROR: backend build missing' && ls -la backend || true && ls -la backend/dist || true && exit 1)"
      
    - name: "Prune dev dependencies"
      command: "npm prune --omit=dev || true"

    - name: "Verify build output"
      command: "ls -la public/ || true && ls -la backend/dist/ || true"

healthCheck:
  path: "/health"
  timeoutSeconds: 10
  checkIntervalSeconds: 10
  failureThreshold: 3
