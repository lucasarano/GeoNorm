runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  env:
    - variable: PORT
      value: "8080"
    - variable: NODE_ENV
      value: "production"

buildConfig:
  runtime: nodejs22
  commands:
    - name: "Install dependencies"
      command: "npm ci"
      
    - name: "Build frontend"
      command: "npm run build"
      
    - name: "Verify tsx and server.js"
      command: "npx tsx --version && test -f server.js && echo 'server.js exists'"
      
    - name: "Test server startup"
      command: "PORT=8080 timeout 10s node server.js || echo 'Server test completed'"

    - name: "Verify build output"
      command: "ls -la public/ && ls -la server.js"

healthCheck:
  path: "/health"
  timeoutSeconds: 10
  checkIntervalSeconds: 10
  failureThreshold: 3
