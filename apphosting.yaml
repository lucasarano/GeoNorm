runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  env:
    - variable: PORT
      value: "8080"
    - variable: NODE_ENV
      value: "production"

buildConfig:
  runtime: nodejs22
  commands:
    - name: "Install dependencies"
      command: "npm ci --omit=dev"
      
    - name: "Build frontend"
      command: "npm run build"
      
    - name: "Install backend dependencies"
      command: "cd backend && npm ci --omit=dev"
      
    - name: "Build backend"
      command: "npm run build:functions"
      
    - name: "Verify build output"
      command: "ls -la public/ && ls -la backend/dist/"

healthCheck:
  path: "/health"
  timeoutSeconds: 10
  checkIntervalSeconds: 10
  failureThreshold: 3
