runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  env:
    - variable: PORT
      value: "8080"
    - variable: NODE_ENV
      value: "production"

buildConfig:
  runtime: nodejs22
  commands:
    - name: "Install dependencies (with dev)"
      command: "npm ci"
      
    - name: "Build frontend"
      command: "npm run build"
      
    - name: "Install backend dependencies (already installed at root)"
      command: "echo skip"
      
    - name: "Build backend"
      command: "npm run build:functions"
      
    - name: "Prune dev dependencies"
      command: "npm prune --omit=dev"

    - name: "Verify build output"
      command: "ls -la public/ || true && ls -la backend/dist/ || true"

healthCheck:
  path: "/health"
  timeoutSeconds: 10
  checkIntervalSeconds: 10
  failureThreshold: 3
