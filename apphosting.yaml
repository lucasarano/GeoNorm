runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  env:
    - variable: PORT
      value: "8080"
    - variable: NODE_ENV
      value: "production"
    - variable: GOOGLE_ENTRYPOINT
      value: "node server.js"

buildConfig:
  runtime: nodejs22
  commands:
    - name: "Install dependencies (with dev)"
      command: "npm ci"
      
    - name: "Build frontend"
      command: "npm run build"
      
    - name: "Verify tsx is available"
      command: "npx tsx --version"
      
    - name: "Keep tsx for runtime, prune other dev deps"
      command: "npm uninstall typescript @types/cors @types/express @types/multer @types/react @types/react-dom @types/uuid @vitejs/plugin-react autoprefixer concurrently eslint globals nodemon postcss tailwindcss typescript-eslint vite || true"

    - name: "Verify build output"
      command: "ls -la public/ || true && ls -la backend/dist/ || true"

healthCheck:
  path: "/health"
  timeoutSeconds: 10
  checkIntervalSeconds: 10
  failureThreshold: 3
